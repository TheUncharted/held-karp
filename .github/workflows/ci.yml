name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Lint & Format ───────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Check formatting
        run: cargo fmt -- --check
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

  # ── Core tests (multi-OS) ──────────────────────────────────────────
  test:
    name: Test (${{ matrix.os }})
    needs: lint
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run core tests
        run: cargo test -p held-karp-core

  # ── Python bindings — build + test ──────────────────────────────────
  e2e-python:
    name: E2E — Python bindings
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: astral-sh/setup-uv@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Create venv and install maturin
        run: |
          uv venv .venv
          source .venv/bin/activate
          uv pip install maturin pytest numpy
      - name: Copy README
        run: cp README.md crates/held-karp-py/README.md
      - name: Build and install Python bindings
        working-directory: crates/held-karp-py
        run: |
          source ../../.venv/bin/activate
          maturin develop --release
      - name: Run Python tests
        run: |
          source .venv/bin/activate
          pytest tests/ -v
